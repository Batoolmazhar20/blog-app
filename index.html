<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar ">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">Post-App</span>
     </div>
</nav>


<div class="container1 mt-3">

  <!-- Login Form -->
  <div id="loginForm" class="row justify-content-center g-0">
    <div class="col-md-4">
      <div class="card p-3">
        <h4 class="mb-3">Login</h4>
        <input id="usernameInput" class="form-control mb-2" placeholder="Username">
        <input id="emailInput" class="form-control mb-2" placeholder="email">
        <input id="passwordInput" type="password" class="form-control mb-2" placeholder="Password">
        <button onclick="login()" class="btn btn-primary w-100">Login</button>
      </div>
    </div>
  </div>





    <div class="container" id="container">
        <div class="row">
       <!--    <div class="col">   --> 
                <div class="col-sm-12 col-md-6 col-lg-4">
                    <div class="card p-3 m-2">
                       
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">title</label>
    <input type="text" class="form-control" id="title" aria-describedby="emailHelp">
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">description</label>
  <textarea
                class="form-control"
                id="description"
                rows="3"
              ></textarea>
</div>
<div class="mb-3 d-flex images justify-content-around">
<img class="bg-img" onclick= "selectImg('./images/img1.gif')" src="./images/img1.gif" alt="">
<img class="bg-img" onclick= "selectImg('./images/img2.gif')" src="./images/img2.gif" alt="">
<img class="bg-img" onclick= "selectImg('./images/img3.gif')" src="./images/img3.gif" alt="">
<img class="bg-img" onclick= "selectImg('./images/img4.gif')" src="./images/img4.gif" alt="">
<img class="bg-img" onclick= "selectImg('./images/img5.gif')" src="./images/img5.gif" alt="">
</div>
<button onclick="post()" type="submit" class="btn btn-primary ms-auto mt-2"
>Post</button>
        </div>
      </div>


<div class="col-sm-12 col-md-6 col-lg-8">
          <div id="posts" class="posts m-2"></div>
        </div>
      </div>
    </div>

            


   <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
